version: "3.8"

# Phoenix DFIR - Docker Compose Production
# Pour demarrer: docker-compose up -d
# Pour les logs: docker-compose logs -f

services:

  # ============================================================================
  # Backend Flask/Gunicorn
  # ============================================================================
  phoenix-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phoenix-backend
    expose:
      - "5000"
    environment:
      # Securite - OBLIGATOIRE en production: definir PHOENIX_SECRET_KEY dans .env
      - PHOENIX_SECRET_KEY=${PHOENIX_SECRET_KEY:?PHOENIX_SECRET_KEY doit etre defini}
      - PHOENIX_DEBUG=false
      - PHOENIX_LOG_FORMAT=json
      - PHOENIX_LOG_LEVEL=${PHOENIX_LOG_LEVEL:-INFO}

      # Tokens
      - PHOENIX_TOKEN_EXPIRY=${PHOENIX_TOKEN_EXPIRY:-3600}
      - PHOENIX_REFRESH_EXPIRY=${PHOENIX_REFRESH_EXPIRY:-604800}

      # Lockout
      - PHOENIX_MAX_FAILED_ATTEMPTS=${PHOENIX_MAX_FAILED_ATTEMPTS:-5}
      - PHOENIX_LOCKOUT_DURATION=${PHOENIX_LOCKOUT_DURATION:-900}

      # CORS: liste des origines autorisees (sep. par virgules)
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:80,http://localhost}

      # Proxy trust (activer si nginx est en front)
      - PHOENIX_TRUST_PROXY=true

      # Gunicorn
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-4}

      # Upload
      - PHOENIX_UPLOAD_RETENTION_HOURS=${PHOENIX_UPLOAD_RETENTION_HOURS:-24}

      # Intelligence artificielle (optionnel)
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY:-}

    volumes:
      - phoenix-data:/app/data
      - phoenix-uploads:/app/backend/uploads
      - phoenix-reports:/app/backend/reports
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - phoenix-internal

  # ============================================================================
  # Reverse Proxy Nginx
  # ============================================================================
  phoenix-nginx:
    image: nginx:1.25-alpine
    container_name: phoenix-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - phoenix-nginx-logs:/var/log/nginx
    depends_on:
      phoenix-backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - phoenix-internal
      - phoenix-external

# ============================================================================
# VOLUMES PERSISTANTS
# ============================================================================
volumes:
  phoenix-data:
    driver: local
  phoenix-uploads:
    driver: local
  phoenix-reports:
    driver: local
  phoenix-nginx-logs:
    driver: local

# ============================================================================
# RESEAUX
# ============================================================================
networks:
  # Reseau interne: backend <-> nginx (pas expose)
  phoenix-internal:
    driver: bridge
    internal: false

  # Reseau externe: nginx <-> internet
  phoenix-external:
    driver: bridge
