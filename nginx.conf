# Phoenix DFIR - Configuration Nginx (Reverse Proxy Production)
# Placer ce fichier dans /etc/nginx/conf.d/ ou l'utiliser via docker-compose

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ========================================================================
    # LOGGING JSON
    # ========================================================================
    log_format json_combined escape=json
        '{"ts":"$time_iso8601",'
        '"ip":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"duration_ms":$request_time,'
        '"referer":"$http_referer",'
        '"ua":"$http_user_agent",'
        '"req_id":"$request_id"}';

    access_log /var/log/nginx/access.log json_combined;

    # ========================================================================
    # SECURITE DE BASE
    # ========================================================================

    # Masquer la version de nginx
    server_tokens off;

    # Timeout pour eviter les connexions zombies (Slowloris mitigation)
    client_body_timeout 30s;
    client_header_timeout 30s;
    keepalive_timeout 65s;
    send_timeout 30s;

    # Taille max du corps (doit correspondre a Flask MAX_CONTENT_LENGTH)
    client_max_body_size 510M;

    # Buffer sizes
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;

    # ========================================================================
    # COMPRESSION
    # ========================================================================
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/x-javascript image/svg+xml;

    # ========================================================================
    # RATE LIMITING
    # ========================================================================

    # Zone pour les endpoints d'authentification (tres strict)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    # Zone pour les uploads (modere)
    limit_req_zone $binary_remote_addr zone=upload:10m rate=30r/m;

    # Zone globale API
    limit_req_zone $binary_remote_addr zone=api:10m rate=120r/m;

    # Status codes pour les rate limits
    limit_req_status 429;

    # ========================================================================
    # UPSTREAM BACKEND
    # ========================================================================
    upstream phoenix_backend {
        server phoenix-backend:5000;
        keepalive 32;
    }

    # ========================================================================
    # SERVEUR PRINCIPAL
    # ========================================================================
    server {
        listen 80;
        server_name _;

        # Generer un ID de requete unique
        add_header X-Request-ID $request_id always;

        # ====================================================================
        # HEADERS DE SECURITE GLOBAUX
        # ====================================================================
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;

        # HSTS (activer seulement si HTTPS est configure)
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # ====================================================================
        # FRONTEND STATIQUE (React build)
        # ====================================================================
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }

        # Assets avec cache long (Vite genere des noms avec hash)
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ====================================================================
        # PROXY API BACKEND
        # ====================================================================
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://phoenix_backend;
            proxy_http_version 1.1;

            # Headers proxy
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            # Buffers
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # Endpoints d'authentification: rate limit strict
        location ~ ^/api/auth/(login|register)$ {
            limit_req zone=auth burst=5 nodelay;

            proxy_pass http://phoenix_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # Upload: rate limit modere + timeout plus long
        location /api/upload {
            limit_req zone=upload burst=10 nodelay;

            proxy_pass http://phoenix_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout long pour les gros fichiers (500MB)
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            proxy_connect_timeout 60s;
        }

        # ====================================================================
        # WEBSOCKET (Flask-SocketIO)
        # ====================================================================
        location /socket.io/ {
            proxy_pass http://phoenix_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;  # 24h pour les connexions WS persistantes
        }

        # ====================================================================
        # SECURITE: Bloquer les acces dangereux
        # ====================================================================

        # Bloquer les fichiers caches
        location ~ /\. {
            deny all;
            return 404;
        }

        # Bloquer les tentatives de traversee de chemin
        location ~ \.\. {
            deny all;
            return 404;
        }

        # Bloquer les fichiers de configuration sensibles
        location ~* \.(env|secret|key|pem|p12|pfx|bak|sql|sqlite|db)$ {
            deny all;
            return 404;
        }

        # ====================================================================
        # PAGES D'ERREUR GENERIQUES (ne pas exposer les details)
        # ====================================================================
        error_page 400 401 403 404 /error.html;
        error_page 429 /429.html;
        error_page 500 502 503 504 /error.html;

        location = /error.html {
            root /usr/share/nginx/html;
            internal;
        }

        location = /429.html {
            return 429 '{"error":"Trop de requetes. Reessayez plus tard."}';
            add_header Content-Type "application/json";
        }
    }
}
