user nginx;
worker_processes auto;
worker_rlimit_nofile 8192;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request":"$request",'
            '"status": $status,'
            '"body_bytes_sent": $body_bytes_sent,'
            '"request_time": $request_time,'
            '"upstream_response_time": "$upstream_response_time",'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"http_x_request_id":"$http_x_request_id"'
        '}';
    access_log /var/log/nginx/access.log json_combined;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    client_max_body_size 600M;        # uploads d'artefacts
    client_body_timeout 60s;
    client_header_timeout 10s;
    send_timeout 60s;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/xml application/x-yaml;

    # Headers de securite (defense en profondeur, l'app les pose deja)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Trust proxy : Phoenix lit X-Forwarded-For pour le rate limiting
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $http_x_request_id;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    upstream phoenix_backend {
        server phoenix-dfir:5000;
        keepalive 16;
    }

    # HTTP -> HTTPS redirect (decommenter si TLS configure)
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    server {
        listen 80 default_server;
        # listen 443 ssl http2;
        # ssl_certificate /etc/nginx/tls/fullchain.pem;
        # ssl_certificate_key /etc/nginx/tls/privkey.pem;
        # ssl_protocols TLSv1.2 TLSv1.3;
        # ssl_ciphers HIGH:!aNULL:!MD5;
        # ssl_prefer_server_ciphers on;
        # ssl_session_cache shared:SSL:10m;
        # ssl_session_timeout 1h;
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        server_name _;

        # Probes Kubernetes/load-balancer
        location = /livez {
            proxy_pass http://phoenix_backend;
            access_log off;
        }
        location = /readyz {
            proxy_pass http://phoenix_backend;
            access_log off;
        }

        # /metrics : restreindre au sous-reseau interne uniquement
        location = /metrics {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 127.0.0.1;
            deny all;
            proxy_pass http://phoenix_backend;
            access_log off;
        }

        # WebSocket Socket.IO
        location /socket.io/ {
            proxy_pass http://phoenix_backend;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
        }

        # API
        location /api/ {
            proxy_pass http://phoenix_backend;
            proxy_read_timeout 60s;
        }

        # Frontend SPA (servi par le backend Flask)
        location / {
            proxy_pass http://phoenix_backend;
            proxy_read_timeout 30s;
        }
    }
}
