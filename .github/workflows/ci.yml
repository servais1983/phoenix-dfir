name: Phoenix DFIR CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov

      - name: Run full test suite (parsers + MITRE + cache + auth + sigma + connectors + API + V4)
        env:
          PHOENIX_SECRET_KEY: test-secret-key-for-testing-only
        working-directory: backend
        run: |
          python -m pytest tests/ -v --tb=short

  security-scan:
    name: Security scan (bandit + pip-audit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install scanners
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      - name: Run Bandit (SAST on backend)
        run: bandit -r backend -ll -ii -x backend/tests -f json -o bandit-report.json || true

      - name: Print Bandit summary
        run: |
          if [ -f bandit-report.json ]; then
            python -c "import json; r=json.load(open('bandit-report.json')); m=r.get('metrics',{}).get('_totals',{}); print(f\"Bandit: HIGH={m.get('SEVERITY.HIGH',0)}, MEDIUM={m.get('SEVERITY.MEDIUM',0)}, LOW={m.get('SEVERITY.LOW',0)}\"); res=r.get('results',[]); print(f\"Findings: {len(res)}\")"
          fi

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

      - name: Run pip-audit (vulnerable dependencies)
        run: |
          pip-audit -r backend/requirements.txt --format json --output pip-audit.json || true

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit.json
          retention-days: 30

  sbom:
    name: Generate SBOM (CycloneDX)
    runs-on: ubuntu-latest
    needs: [backend-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install cyclonedx-bom

      - name: Generate Python SBOM (CycloneDX JSON)
        run: |
          cyclonedx-py environment --output-format JSON --output-file sbom-python.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-python
          path: sbom-python.json
          retention-days: 90

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # package-lock.json est gitignore -> npm install au lieu de npm ci
        # --legacy-peer-deps : conflit react-day-picker 8.x / date-fns 4.x
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          echo "Bundle size report:"
          du -sh dist/
          du -sh dist/assets/*.js 2>/dev/null | sort -rh | head -10

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  docker-build:
    name: Docker build + smoke test
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: phoenix-dfir:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test container starts & health probes
        run: |
          docker run -d --name phoenix-test -p 5000:5000 phoenix-dfir:test
          # Attendre la disponibilite (max 30s)
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:5000/livez >/dev/null 2>&1; then
              echo "Container ready after ${i}s"
              break
            fi
            sleep 1
          done
          curl -fsS http://localhost:5000/livez
          echo ""
          curl -fsS http://localhost:5000/api/health
          echo ""
          # /metrics doit etre joignable (200 ou 503 si prometheus_client manquant)
          curl -fsS -o /dev/null -w "metrics: %{http_code}\n" http://localhost:5000/metrics
          docker logs phoenix-test | tail -50
          docker stop phoenix-test
