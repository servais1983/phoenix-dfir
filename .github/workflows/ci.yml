name: Phoenix DFIR CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Run parser tests
        run: |
          cd backend
          python -m pytest tests/test_parsers.py -v

      - name: Run API tests
        env:
          PHOENIX_SECRET_KEY: test-secret-key
        run: |
          cd backend
          python -m pytest tests/test_api.py -v

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          echo "Bundle size report:"
          du -sh dist/
          du -sh dist/assets/*.js | sort -rh | head -10

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t phoenix-dfir:test .

      - name: Test container starts
        run: |
          docker run -d --name phoenix-test -p 5000:5000 phoenix-dfir:test
          sleep 5
          curl -f http://localhost:5000/api/health || exit 1
          docker stop phoenix-test
